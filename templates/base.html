<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}Student Performance Prediction{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5.3.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Custom CSS -->
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #64748b;
            --accent: #f43f5e;
            --bg-light: #f8fafc;
            --card-light: rgba(255, 255, 255, 0.8);
            --text-main: #0f172a;
            --text-muted: #64748b;

            /* Dark Mode Variables */
            --bg-dark: #020617;
            --card-dark: rgba(15, 23, 42, 0.8);
            --text-dark: #f8fafc;
            --text-dark-muted: #94a3b8;

            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-light);
            color: var(--text-main);
            transition: background 0.5s ease, color 0.5s ease;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Mesh Gradient Background */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background:
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0, transparent 50%),
                radial-gradient(at 100% 0%, rgba(244, 63, 94, 0.1) 0, transparent 50%),
                radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.1) 0, transparent 50%),
                radial-gradient(at 0% 100%, rgba(244, 63, 94, 0.15) 0, transparent 50%);
            transition: opacity 0.5s ease;
        }

        body.dark-mode {
            background-color: var(--bg-dark);
            color: var(--text-dark);
        }

        body.dark-mode::before {
            background:
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.2) 0, transparent 50%),
                radial-gradient(at 100% 0%, rgba(244, 63, 94, 0.15) 0, transparent 50%),
                radial-gradient(at 100% 100%, rgba(79, 70, 229, 0.2) 0, transparent 50%),
                radial-gradient(at 0% 100%, rgba(225, 29, 72, 0.15) 0, transparent 50%);
        }

        .main-container {
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
            padding: 1.5rem;
            flex-grow: 1;
            animation: fadeInUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Navbar Enhancement */
        .navbar {
            background: rgba(255, 255, 255, 0.7) !important;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 0.75rem 0;
            z-index: 1000;
        }

        body.dark-mode .navbar {
            background: rgba(2, 6, 23, 0.7) !important;
        }

        .navbar-brand {
            color: var(--primary) !important;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Dark Mode Toggle */
        #darkToggle {
            border-radius: 12px;
            padding: 0.6rem 1rem;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.5);
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        body.dark-mode #darkToggle {
            background: rgba(15, 23, 42, 0.5);
            color: var(--text-dark);
        }

        #darkToggle:hover {
            transform: translateY(-2px);
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        /* Card Styling */
        .card {
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            background: var(--card-light);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: var(--glass-shadow);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.4s ease;
        }

        body.dark-mode .card {
            background: var(--card-dark);
        }

        .hover-card:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }

        footer {
            margin-top: auto;
            background: transparent;
            color: var(--text-muted);
            padding: 3rem 0;
            border-top: 1px solid var(--glass-border);
        }

        body.dark-mode footer {
            color: var(--text-dark-muted);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.2);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }
    </style>
</head>

<body class="{% block body_class %}{% endblock %}">

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container main-container py-0 my-0">
            <a class="navbar-brand" href="{{ url_for('upload_file') }}">
                <i data-lucide="scan-face" class="text-primary"></i>
                <span>StudentLens</span>
            </a>
            <div class="ms-auto d-flex align-items-center gap-3">
                <a class="nav-link fw-bold text-main dark-mode-text d-none d-md-block" href="{{ url_for('research') }}">Research</a>
                <button class="btn" id="darkToggle">
                    <i id="themeIcon" data-lucide="moon"></i>
                    <span id="themeText" class="d-none d-md-inline">Dark Mode</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="main-container">
        {% block content %}{% endblock %}
    </div>

    <footer class="text-center">
        <div class="container">
            <div class="d-flex justify-content-center gap-2 mb-2">
                <i data-lucide="cpu" class="text-primary" size="20"></i>
                <span class="fw-bold text-main dark-mode-text">AI Analytics Engine</span>
            </div>
            <p class="mb-0 small">&copy; 2026 Designed with Precision & Care</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        const toggle = document.getElementById("darkToggle");
        const themeIcon = document.getElementById("themeIcon");
        const themeText = document.getElementById("themeText");
        const body = document.body;

        function updateThemeUI(isDark) {
            if (isDark) {
                themeIcon.setAttribute("data-lucide", "sun");
                themeText.textContent = "Light Mode";
            } else {
                themeIcon.setAttribute("data-lucide", "moon");
                themeText.textContent = "Dark Mode";
            }
            lucide.createIcons();
        }

        // Check saved preference
        if (localStorage.getItem('theme') === 'dark') {
            body.classList.add('dark-mode');
            updateThemeUI(true);
        }

        toggle.addEventListener("click", () => {
            const isDark = body.classList.toggle("dark-mode");
            updateThemeUI(isDark);
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });
    </script>

    <style>
        body.dark-mode .dark-mode-text {
            color: var(--text-dark) !important;
        }

        /* Dark Mode Utility Overrides */
        body.dark-mode .text-secondary,
        body.dark-mode .text-muted {
            color: var(--text-dark-muted) !important;
        }

        body.dark-mode .text-main,
        body.dark-mode h1,
        body.dark-mode h2,
        body.dark-mode h3,
        body.dark-mode h4,
        body.dark-mode h5,
        body.dark-mode h6,
        body.dark-mode label {
            color: var(--text-dark) !important;
        }

        body.dark-mode .bg-light {
            background-color: rgba(15, 23, 42, 0.3) !important;
            border-color: var(--glass-border) !important;
        }

        body.dark-mode .navbar-brand span {
            color: var(--text-dark) !important;
        }

        body.dark-mode .table {
            color: var(--text-dark) !important;
            border-color: var(--glass-border);
        }

        body.dark-mode .table thead th {
            background-color: rgba(15, 23, 42, 0.8) !important;
            color: var(--text-dark) !important;
        }

        body.dark-mode .table tbody td {
            background-color: transparent !important;
            color: var(--text-dark-muted) !important;
        }
    </style>

</body>

</html>
